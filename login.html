<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PE Mobile - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #2563eb;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .loading {
            display: none;
            text-align: center;
            color: #6b7280;
            margin-top: 1rem;
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #6b7280;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>⚡ PE Mobile</h1>
            <p>Platinum Electricians Job Tracker</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                🚀 Login to PE Mobile
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Logging in...</p>
        </div>

        <div class="footer">
            <p>Secure access to your daily jobs</p>
        </div>
    </div>

    <script>
        // Team member credentials (in production, this would be server-side)
        const teamCredentials = {
            'ramsey': { password: 'pe2026', techId: '2273', name: 'Ramsey Kanafani' },
            'darius': { password: 'pe2026', techId: '5796', name: 'Darius Marsh' },
            'max': { password: 'pe2026', techId: '5795', name: 'Max Mitchell' },
            'houssam': { password: 'pe2026', techId: '5815', name: 'Houssam Kanafani' },
            'dario': { password: 'pe2026', techId: '5681', name: 'Dario Mancini' },
            'damin': { password: 'pe2026', techId: '4970', name: 'Damin Anderson' },
            'jake': { password: 'pe2026', techId: '4925', name: 'Jake Clark' },
            'bailey': { password: 'pe2026', techId: '5090', name: 'Bailey Gould' }
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.toLowerCase();
            const password = document.getElementById('password').value;
            
            showLoading(true);
            
            // Simulate login delay for security
            setTimeout(() => {
                if (teamCredentials[username] && teamCredentials[username].password === password) {
                    // Store login info
                    const userInfo = teamCredentials[username];
                    sessionStorage.setItem('pe_mobile_user', JSON.stringify({
                        username: username,
                        techId: userInfo.techId,
                        name: userInfo.name,
                        loginTime: new Date().toISOString()
                    }));
                    
                    // Redirect to main app
                    window.location.href = '/app.html';
                } else {
                    showError('Invalid username or password');
                    showLoading(false);
                }
            }, 1000);
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function showLoading(show) {
            const loadingEl = document.getElementById('loading');
            const formEl = document.getElementById('loginForm');
            
            if (show) {
                loadingEl.style.display = 'block';
                formEl.style.display = 'none';
            } else {
                loadingEl.style.display = 'none';
                formEl.style.display = 'block';
            }
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const userInfo = sessionStorage.getItem('pe_mobile_user');
            if (userInfo) {
                window.location.href = '/app.html';
            }
        });
    </script>
</body>
</html>
